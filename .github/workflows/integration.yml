name: Go Integration Tests

on:
  push:
    branches: ["main"]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23.1"

      - name: Run integration tests
        env:
          # example secret usage (add your real ones here)
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: go test --tags integration -v ./integration/ -run TestToolCallModels